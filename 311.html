<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~~~~~急救技术*****</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f0e8 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .home-btn {
            background: #5a7a96;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .home-btn:hover {
            background: #4a6a86;
            transform: translateY(-2px);
        }
        
        .page-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        
        .page-btn {
            background: #7a9e7e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover {
            background: #5a7e5e;
            transform: translateY(-2px);
        }
        
        .fav-btn {
            background: #c9a86c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .fav-btn:hover {
            background: #b8985c;
            transform: translateY(-2px);
        }
        
        .fav-btn.active {
            background: #c75c5c;
        }
        
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .title-section {
            background: linear-gradient(90deg, #3d5a80 0%, #5a7a96 50%, #7a9e9e 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        
        .main-title {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        .sub-title {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }
        
        .content-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .content-table th {
            background: #5a7a96;
            color: white;
            padding: 18px 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .content-table td {
            padding: 50px 15px;
            text-align: center;
            border-bottom: 1px solid #e8e8e8;
            line-height: 1.8;
            font-size: 18px;
            color: #444;
        }
        
        .content-table tr:hover {
            background: #f8fbff;
        }
        
        .content-table tr:last-child td {
            border-bottom: none;
        }
        
        .chapter-title {
            font-size: 42px;
            font-weight: bold;
            color: #3d5a80;
            letter-spacing: 8px;
            padding: 80px 20px;
        }
        
        .decorative-border {
            border: 3px double #c9a86c;
            margin: 30px;
            padding: 20px;
            position: relative;
        }
        
        .decorative-border::before {
            content: "❦";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 15px;
            color: #c9a86c;
            font-size: 24px;
        }
        
        .page-number {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
        }
        
        .tags-section {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }
        
        .tags-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .tag {
            display: inline-block;
            background: #e8f0e8;
            color: #5a7e5e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px;
            border: 1px solid #c8d8c8;
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            background: #5a7e5e;
            color: white;
            transform: scale(1.05);
        }
        
        .copy-section {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        
        .copy-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .copy-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            background: #fafafa;
        }
        
        .copy-btn {
            background: #8b7aa8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background: #7a6a97;
            transform: translateY(-2px);
        }
        
        .copy-btn.copied {
            background: #7a9e7e;
        }
        
        .keywords-section {
            padding: 15px 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
            background: #f8f9fa;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .main-title {
                font-size: 20px;
            }
            
            .content-table th {
                font-size: 18px;
                padding: 14px 12px;
            }
            
            .content-table td {
                padding: 30px 12px;
                font-size: 16px;
            }
            
            .chapter-title {
                font-size: 32px;
                padding: 50px 15px;
                letter-spacing: 4px;
            }
            
            .nav-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .page-nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            
            .copy-wrapper {
                flex-direction: column;
            }
            
            .copy-input {
                width: 100%;
            }
            
            .decorative-border {
                margin: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="home-btn">← 返回首页</a>
        <div class="page-nav">
            <a href="310.html" class="page-btn">上一页</a>
            <a href="312.html" class="page-btn">下一页</a>
            <button class="fav-btn" id="favBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
    </div>
    
    <div class="main-container">
        <div class="title-section">
            <h1 class="main-title">~~~~~急救技术*****</h1>
            <p class="sub-title">章节首页 | 第311页</p>
        </div>
        
        <table class="content-table">
            <thead>
                <tr>
                    <th>章节内容</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="decorative-border">
                            <div class="chapter-title">急救技术</div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="page-number">— 311 —</div>
        
        <div class="tags-section">
            <div class="tags-title">特色检索标签：</div>
            <span class="tag">急救技术</span>
        </div>
        
        <div class="copy-section">
            <div class="copy-wrapper">
                <input type="text" class="copy-input" id="copyInput" value="急救技术；章节首页；急救技术；=311" readonly>
                <button class="copy-btn" id="copyBtn" onclick="copyContent()">复制</button>
            </div>
        </div>
        
        <div class="keywords-section">
            关键词：311
        </div>
    </div>
    
    <script>
        function copyContent() {
            const input = document.getElementById('copyInput');
            input.select();
            input.setSelectionRange(0, 99999);
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showCopied();
                });
            } else {
                document.execCommand('copy');
                showCopied();
            }
        }
        
        function showCopied() {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✓ 已复制';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '复制';
                btn.classList.remove('copied');
            }, 2000);
        }
        
        function toggleFavorite() {
            const btn = document.getElementById('favBtn');
            const isActive = btn.classList.contains('active');
            
            if (!isActive) {
                btn.classList.add('active');
                btn.innerHTML = '★ 已收藏';
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                const item = {
                    title: '急救技术',
                    url: '311.html',
                    category: '章节首页',
                    tags: ['急救技术']
                };
                
                const exists = favorites.some(f => f.url === item.url);
                if (!exists) {
                    favorites.push(item);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
                
                alert('已添加到收藏！请在首页查看。');
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '☆ 收藏';
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(f => f.url !== '311.html');
                localStorage.setItem('favorites', JSON.stringify(favorites));
            }
        }
        
        window.onload = function() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const isFav = favorites.some(f => f.url === '311.html');
            if (isFav) {
                const btn = document.getElementById('favBtn');
                btn.classList.add('active');
                btn.innerHTML = '★ 已收藏';
            }
        };
    </script>
</body>
</html>
