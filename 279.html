<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~~~~~医学文献扫描页279*****</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        /* 顶部导航栏 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
        }
        
        .home-btn {
            background: linear-gradient(135deg, #4a90d9, #357abd);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
            transition: transform 0.2s;
        }
        
        .home-btn:hover {
            transform: translateY(-2px);
        }
        
        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        
        .page-nav {
            display: flex;
            gap: 10px;
        }
        
        .page-btn {
            background: linear-gradient(135deg, #5cb85c, #449d44);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 6px rgba(92, 184, 92, 0.3);
        }
        
        .fav-btn {
            background: linear-gradient(135deg, #f0ad4e, #ec971f);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(240, 173, 78, 0.3);
            margin-top: 5px;
        }
        
        /* 标题区域 */
        .title-section {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .main-title {
            font-size: 22px;
            color: #1a5276;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .sub-title {
            font-size: 14px;
            color: #5d6d7e;
        }
        
        /* 表格样式 */
        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        thead {
            background: linear-gradient(135deg, #2e86de, #1e6bc4);
            color: white;
        }
        
        th {
            padding: 15px 12px;
            text-align: left;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 2px solid #1a5276;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e8e8e8;
            line-height: 1.8;
            color: #444;
            vertical-align: top;
        }
        
        tr:nth-child(even) {
            background-color: #f8fbff;
        }
        
        tr:hover {
            background-color: #e8f4fd;
        }
        
        /* 第一行字体大一点 */
        tbody tr:first-child td {
            font-size: 15px;
            font-weight: 500;
            color: #1a5276;
        }
        
        /* 标签区域 */
        .tags-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .tags-title {
            font-size: 16px;
            color: #1a5276;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
        }
        
        /* 关键词区域 */
        .keywords-section {
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .keywords {
            color: #5d6d7e;
            font-size: 13px;
        }
        
        /* 页码 */
        .page-number {
            text-align: center;
            font-size: 18px;
            color: #1a5276;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        /* 底部编辑框区域 */
        .copy-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex-wrap: wrap;
        }
        
        .copy-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 13px;
            color: #555;
            background: #fafafa;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(155, 89, 182, 0.3);
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .main-title {
                font-size: 18px;
            }
            
            th {
                font-size: 14px;
                padding: 12px 8px;
            }
            
            td {
                padding: 10px 8px;
                font-size: 13px;
            }
            
            .copy-section {
                flex-direction: column;
            }
            
            .copy-input {
                width: 100%;
            }
            
            .copy-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <a href="index.html" class="home-btn">🏠 返回首页</a>
        <div class="nav-right">
            <div class="page-nav">
                <a href="278.html" class="page-btn">← 上一页</a>
                <a href="280.html" class="page-btn">下一页 →</a>
            </div>
            <button class="fav-btn" onclick="addToFavorites()">⭐ 收藏</button>
        </div>
    </div>
    
    <!-- 标题 -->
    <div class="title-section">
        <div class="main-title">~~~~~医学文献扫描页279*****</div>
        <div class="sub-title">Scanner Pro扫描文档 | 第279页</div>
    </div>
    
    <!-- 表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>内容分类</th>
                    <th>详细内容</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>文档来源</td>
                    <td>使用 Scanner Pro 创建</td>
                </tr>
                <tr>
                    <td>页面信息</td>
                    <td>第279页医学文献扫描文档</td>
                </tr>
                <tr>
                    <td>主要内容</td>
                    <td>图片质量较低，无法准确识别具体医学内容。<br>建议提供更清晰的扫描件以便准确提取信息。</td>
                </tr>
                <tr>
                    <td>备注</td>
                    <td>本页为过渡页或内容页，包含医学相关文字描述</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- 检索标签 -->
    <div class="tags-section">
        <div class="tags-title">🔖 检索标签</div>
        <div class="tags-container">
            <span class="tag">Scanner Pro</span>
            <span class="tag">医学文献</span>
            <span class="tag">扫描文档</span>
        </div>
    </div>
    
    <!-- 关键词 -->
    <div class="keywords-section">
        <span class="keywords">关键词：医学文献 | 扫描页 | 文档识别 | 第279页</span>
    </div>
    
    <!-- 页码 -->
    <div class="page-number">279</div>
    
    <!-- 复制区域 -->
    <div class="copy-section">
        <input type="text" class="copy-input" id="copyText" value="医学文献扫描页279;Scanner Pro扫描文档;医学文献,扫描页,文档识别,第279页;=279" readonly>
        <button class="copy-btn" onclick="copyToClipboard()">📋 复制</button>
    </div>
    
    <!-- 提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 复制功能
        function copyToClipboard() {
            const input = document.getElementById('copyText');
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value).then(() => {
                showToast('已复制到剪贴板！');
            });
        }
        
        // 收藏功能
        function addToFavorites() {
            // 获取当前页面信息
            const title = '医学文献扫描页279';
            const url = window.location.href;
            
            // 尝试添加到本地存储的收藏列表
            let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const exists = favorites.some(f => f.url === url);
            
            if (!exists) {
                favorites.push({
                    title: title,
                    url: url,
                    page: '279'
                });
                localStorage.setItem('favorites', JSON.stringify(favorites));
                showToast('已添加到收藏！');
            } else {
                showToast('已在收藏列表中！');
            }
        }
        
        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
