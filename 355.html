<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~~~~~急诊常用药物*****</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }
        
        .main-title {
            font-size: 22px;
            font-weight: bold;
            color: #1a5276;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .subtitle {
            font-size: 14px;
            color: #5d6d7e;
        }
        
        .nav-buttons {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .nav-btn, .fav-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .nav-btn {
            background: #3498db;
            color: white;
        }
        
        .nav-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .fav-btn {
            background: #e74c3c;
            color: white;
        }
        
        .fav-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .fav-btn.active {
            background: #27ae60;
        }
        
        .home-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .home-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        
        .table-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table-header {
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        
        .content-cell {
            padding: 40px 20px;
            text-align: center;
            line-height: 2;
            font-size: 16px;
            color: #2c3e50;
        }
        
        .ornament-top {
            font-size: 48px;
            color: #1a5276;
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .main-text {
            font-size: 42px;
            font-weight: bold;
            color: #1a5276;
            letter-spacing: 8px;
            margin: 30px 0;
        }
        
        .ornament-border {
            border: 3px double #1a5276;
            padding: 60px 40px;
            margin: 20px;
            position: relative;
        }
        
        .ornament-border::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid #aed6f1;
            pointer-events: none;
        }
        
        .tags-section {
            max-width: 800px;
            margin: 25px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .tags-title {
            font-size: 16px;
            font-weight: bold;
            color: #1a5276;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .tag {
            padding: 8px 16px;
            background: #eaf2f8;
            color: #1a5276;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #aed6f1;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            background: #1a5276;
            color: white;
        }
        
        .bottom-section {
            max-width: 800px;
            margin: 25px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .keywords-title {
            font-size: 16px;
            font-weight: bold;
            color: #1a5276;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .keyword {
            padding: 6px 14px;
            background: #f8f9f9;
            color: #5d6d7e;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid #d5dbdb;
        }
        
        .page-number {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1a5276;
            margin: 15px 0;
        }
        
        .copy-section {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }
        
        .copy-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #aed6f1;
            border-radius: 8px;
            font-size: 13px;
            color: #2c3e50;
            background: #f8f9f9;
        }
        
        .copy-btn {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .copy-btn:hover {
            background: #2980b9;
        }
        
        .copy-btn.copied {
            background: #27ae60;
        }
        
        .footer-info {
            text-align: center;
            color: #5d6d7e;
            font-size: 12px;
            margin-top: 15px;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .main-title {
                font-size: 18px;
            }
            
            .nav-buttons {
                position: relative;
                top: auto;
                right: auto;
                flex-direction: row;
                justify-content: center;
                margin-bottom: 15px;
            }
            
            .home-btn {
                position: relative;
                top: auto;
                left: auto;
                display: inline-block;
                margin-bottom: 10px;
            }
            
            .header {
                margin-top: 10px;
            }
            
            .main-text {
                font-size: 28px;
                letter-spacing: 4px;
            }
            
            .ornament-border {
                padding: 40px 20px;
                margin: 10px;
            }
            
            .ornament-top {
                font-size: 32px;
            }
            
            .copy-section {
                flex-direction: column;
            }
            
            .copy-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">← 返回首页</a>
    
    <div class="nav-buttons">
        <a href="354.html" class="nav-btn">↑ 上一页</a>
        <a href="356.html" class="nav-btn">↓ 下一页</a>
        <button class="fav-btn" id="favBtn" onclick="toggleFavorite()">☆ 收藏</button>
    </div>
    
    <div class="header">
        <h1 class="main-title">~~~~~急诊常用药物*****</h1><div class="kw-auto" style="margin:12px 0;padding:8px 12px;background:#e8f4f8;border-left:4px solid #0891b2;border-radius:6px;font-size:13px;color:#334;line-height:1.7;">关键词：~~~~~急诊常用药物*****、急诊常用药物、❦ 急诊常用药物 ❦、使用 Scanner Pro 创建</div>
        <p class="subtitle">章节封面</p>
    </div>
    
    <div class="table-container">
        <table>
            <tr>
                <td class="table-header">
                    急诊常用药物
                </td>
            </tr>
            
            <tr>
                <td class="content-cell">
                    <div class="ornament-border">
                        <div class="ornament-top">❦</div>
                        <div class="main-text">急诊常用药物</div>
                        <div class="ornament-top">❦</div>
                    </div>
                </td>
            </tr>
            
            <tr>
                <td class="footer-info">
                    使用 Scanner Pro 创建
                </td>
            </tr>
        </table>
    </div>
    
    <div class="tags-section">
        <div class="tags-title">🏷️ 特色检索标签</div>
        <div class="tags-container">
            <span class="tag">急诊常用药物</span>
        </div>
    </div>
    
    <div class="bottom-section">
        <div class="keywords-title">🔑 关键词</div>
        <div class="keywords">
            <span class="keyword">急诊</span>
            <span class="keyword">常用药物</span>
            <span class="keyword">药物</span>
        </div>
        
        <div class="page-number">355</div>
        
        <div class="copy-section">
            <input type="text" class="copy-input" id="copyInput" readonly>
            <button class="copy-btn" id="copyBtn" onclick="copyContent()">复制</button>
        </div>
    </div>
    
    <script>
        // 设置复制输入框内容
        const pageNum = '355';
        const title = '急诊常用药物';
        const subtitle = '章节封面';
        const keywords = '急诊;常用药物;药物';
        document.getElementById('copyInput').value = title + '；' + subtitle + '；' + keywords + '；=' + pageNum;
        
        // 复制功能
        function copyContent() {
            const input = document.getElementById('copyInput');
            input.select();
            input.setSelectionRange(0, 99999);
            
            try {
                navigator.clipboard.writeText(input.value).then(() => {
                    const btn = document.getElementById('copyBtn');
                    btn.textContent = '已复制';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            } catch (err) {
                document.execCommand('copy');
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            }
        }
        
        // 收藏功能
        function toggleFavorite() {
            const btn = document.getElementById('favBtn');
            const isFav = localStorage.getItem('fav_355') === 'true';
            
            if (!isFav) {
                localStorage.setItem('fav_355', 'true');
                btn.innerHTML = '★ 已收藏';
                btn.classList.add('active');
                
                // 保存到index的收藏数据
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                const favItem = {
                    page: '355',
                    title: '急诊常用药物',
                    url: '355.html',
                    category: '章节封面'
                };
                if (!favorites.find(f => f.page === '355')) {
                    favorites.push(favItem);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
            } else {
                localStorage.removeItem('fav_355');
                btn.innerHTML = '☆ 收藏';
                btn.classList.remove('active');
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(f => f.page !== '355');
                localStorage.setItem('favorites', JSON.stringify(favorites));
            }
        }
        
        // 初始化收藏状态
        if (localStorage.getItem('fav_355') === 'true') {
            const btn = document.getElementById('favBtn');
            btn.innerHTML = '★ 已收藏';
            btn.classList.add('active');
        }
    </script>
</body>
</html>
