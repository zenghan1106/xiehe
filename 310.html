<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);

            padding: 20px;
            color: #333;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .home-btn {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .home-btn:hover {
            background: #357abd;
            transform: translateY(-2px);
        }
        
        .page-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        
        .page-btn {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover {
            background: #449d44;
            transform: translateY(-2px);
        }
        
        .fav-btn {
            background: #f0ad4e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .fav-btn:hover {
            background: #ec971f;
            transform: translateY(-2px);
        }
        
        .fav-btn.active {
            background: #d9534f;
        }
        
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .title-section {
            background: linear-gradient(90deg, #1e5799 0%, #2989d8 50%, #207cca 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        
        .main-title {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        .sub-title {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
        }
        
        .content-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .content-table th {
            background: #4a90d9;
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-size: 18px;
            font-weight: bold;
        }
        
        .content-table td {
            padding: 15px;
            border-bottom: 1px solid #e8e8e8;
            line-height: 1.8;
            font-size: 15px;
            color: #444;
        }
        
        .content-table tr:hover {
            background: #f8fbff;
        }
        
        .content-table tr:last-child td {
            border-bottom: none;
        }
        
        .bullet {
            color: #4a90d9;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .author {
            text-align: right;
            color: #888;
            font-style: italic;
        }
        
        .page-number {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
            border-top: 1px solid #eee;
        }
        
        .tags-section {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }
        
        .tags-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px;
            border: 1px solid #bbdefb;
            transition: all 0.3s ease;
        }
        
        .tag:hover {
            background: #1976d2;
            color: white;
            transform: scale(1.05);
        }
        
        .tag.disease {
            background: #fce4ec;
            color: #c2185b;
            border-color: #f8bbd9;
        }
        
        .tag.disease:hover {
            background: #c2185b;
            color: white;
        }
        
        .tag.antibiotic {
            background: #e8f5e9;
            color: #388e3c;
            border-color: #c8e6c9;
        }
        
        .tag.antibiotic:hover {
            background: #388e3c;
            color: white;
        }
        
        .tag.bacteria {
            background: #fff3e0;
            color: #f57c00;
            border-color: #ffe0b2;
        }
        
        .tag.bacteria:hover {
            background: #f57c00;
            color: white;
        }
        
        .copy-section {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        
        .copy-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .copy-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            background: #fafafa;
        }
        
        .copy-btn {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background: #5b4cdb;
            transform: translateY(-2px);
        }
        
        .copy-btn.copied {
            background: #00b894;
        }
        
        .keywords-section {
            padding: 15px 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
            background: #f8f9fa;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .main-title {
                font-size: 20px;
            }
            
            .content-table th {
                font-size: 16px;
                padding: 14px 12px;
            }
            
            .content-table td {
                padding: 12px;
                font-size: 14px;
            }
            
            .nav-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .page-nav {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            
            .copy-wrapper {
                flex-direction: column;
            }
            
            .copy-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="home-btn">← 返回首页</a>
        <div class="page-nav">
            <a href="309.html" class="page-btn">上一页</a>
            <a href="311.html" class="page-btn">下一页</a>
            <button class="fav-btn" id="favBtn" onclick="toggleFavorite()">☆ 收藏</button>
        </div>
    </div>
    
    <div class="main-container">
        <div class="title-section">
            <h1 class="main-title">~~~~~烧伤患者监测与治疗*****</h1>
            <p class="sub-title">急诊疾病 | 第298页</p>
        </div>
        
        <table class="content-table">
            <thead>
                <tr>
                    <th>治疗要点</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="bullet">●</span>监测。</td>
                </tr>
                <tr>
                    <td><span class="bullet">●</span>积极的静脉补液，尤其是对存在肌肉坏死的患者，同时监测是否发生急性骨筋膜室综合征、横纹肌溶解和急性肾损伤。</td>
                </tr>
                <tr>
                    <td><span class="bullet">●</span>皮肤伤口的治疗方式与火烧伤或其他热烧伤治疗相似。非浅表性烧伤需局部抗生素预防性治疗。</td>
                </tr>
                <tr>
                    <td class="author">（王江山）</td>
                </tr>
            </tbody>
        </table>
        
        <div class="page-number">— 298 —</div>
        
        <div class="tags-section">
            <div class="tags-title">特色检索标签：</div>
            <span class="tag disease">急性骨筋膜室综合征</span>
            <span class="tag disease">横纹肌溶解</span>
            <span class="tag disease">急性肾损伤</span>
            <span class="tag disease">烧伤</span>
            <span class="tag disease">热烧伤</span>
            <span class="tag disease">非浅表性烧伤</span>
            <span class="tag antibiotic">抗生素</span>
        </div>
        
        <div class="copy-section">
            <div class="copy-wrapper">
                <input type="text" class="copy-input" id="copyInput" value="烧伤患者监测与治疗；急诊疾病；急性骨筋膜室综合征、横纹肌溶解、急性肾损伤、烧伤、热烧伤、非浅表性烧伤、抗生素；=298" readonly>
                <button class="copy-btn" id="copyBtn" onclick="copyContent()">复制</button>
            </div>
        </div>
        
        <div class="keywords-section">
            关键词：298
        </div>
    </div>
    
    <script>
        function copyContent() {
            const input = document.getElementById('copyInput');
            input.select();
            input.setSelectionRange(0, 99999);
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showCopied();
                });
            } else {
                document.execCommand('copy');
                showCopied();
            }
        }
        
        function showCopied() {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✓ 已复制';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '复制';
                btn.classList.remove('copied');
            }, 2000);
        }
        
        function toggleFavorite() {
            const btn = document.getElementById('favBtn');
            const isActive = btn.classList.contains('active');
            
            if (!isActive) {
                btn.classList.add('active');
                btn.innerHTML = '★ 已收藏';
                
                // 保存收藏信息到localStorage，供index.html读取
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                const item = {
                    title: '烧伤患者监测与治疗',
                    url: '298.html',
                    category: '急诊疾病',
                    tags: ['急性骨筋膜室综合征', '横纹肌溶解', '急性肾损伤', '烧伤', '抗生素']
                };
                
                // 避免重复添加
                const exists = favorites.some(f => f.url === item.url);
                if (!exists) {
                    favorites.push(item);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                }
                
                alert('已添加到收藏！请在首页查看。');
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '☆ 收藏';
                
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(f => f.url !== '298.html');
                localStorage.setItem('favorites', JSON.stringify(favorites));
            }
        }
        
        // 页面加载时检查是否已收藏
        window.onload = function() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const isFav = favorites.some(f => f.url === '298.html');
            if (isFav) {
                const btn = document.getElementById('favBtn');
                btn.classList.add('active');
                btn.innerHTML = '★ 已收藏';
            }
        };
    </script>
</body>
</html>
